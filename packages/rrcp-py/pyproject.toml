[project]
name = "rrcp"
version = "0.1.0a1"
description = "rrcp - agent communication protocol"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    {name = "0x0064", email = "user.frndvrgs@gmail.com"},
]
keywords = [
    "rrcp",
    "acp",
    "assistant",
    "agent",
    "sdk",
    "ai",
    "python"
]

dependencies = [
    "pydantic>=2.12.5",
    "asyncpg>=0.31.0",
    "python-socketio[asgi]>=5.13.0,<6",
]

[project.urls]
Repository = "https://github.com/0x0064/rrcp"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rrcp"]

[project.optional-dependencies]
dev = [
    "mypy>=1.19.1",
    "poethepoet>=0.42.1",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=6.0.0",
    "ruff>=0.15.7",
    "fastapi>=0.117.0",
    "httpx>=0.28.1",
    "uvicorn>=0.32.0",
    "aiohttp>=3.11.0",
    "build>=1.2.2",
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.format]
quote-style = "double"

[[tool.mypy.overrides]]
module = ["asyncpg", "asyncpg.*", "socketio", "socketio.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"

[tool.poe.tasks]
format = "ruff format ."
"format:imports" = "ruff check --select I --fix ."
check = "ruff check ."
"check:fix" = "ruff check --fix ."
typecheck = "mypy src/rrcp"
test = "pytest"
"test:cov" = "pytest --cov=src --cov-report=term-missing"
dev = ["check", "typecheck", "test"]
build = "python -m build"
